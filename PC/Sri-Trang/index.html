<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบจำนวนนักกีฬาคณะศรีตรัง</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f3f4f6;
        }
        
        .trang-bg { background-color: #5c2d91; }
        .trang-text { color: #5c2d91; }
        .trang-border { border-color: #5c2d91; }

        .spin-anim { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ========================================================
           การตั้งค่าสำหรับการสั่งพิมพ์ (Print CSS)
           ======================================================== */
        @media print {
            body { 
                background-color: white !important; 
                margin: 0 !important;
                padding: 0 !important;
                color: black !important;
            }
            
            body > *:not(#print-area) { display: none !important; }
            
            #print-area { 
                display: block !important; 
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
            }

            .print-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 15px; 
                font-size: 14pt;
                page-break-inside: auto; 
            }
            .print-table tr {
                page-break-inside: avoid; 
                page-break-after: auto;
            }
            .print-table th, .print-table td {
                border: 1px solid #000 !important;
                padding: 10px 8px;
                text-align: left;
            }
            .print-table th {
                background-color: #f3e8ff !important; 
                color: #5c2d91 !important;
                font-weight: bold;
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact;
            }
            
            .print-header {
                font-size: 26pt !important;
                font-weight: bold !important;
                text-align: center;
                margin-bottom: 20px;
                border-bottom: 3px solid #5c2d91;
                padding-bottom: 10px;
                color: #5c2d91 !important;
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact;
            }

            .page-container {
                display: block; 
                width: 100%;
                padding-top: 1.5cm !important; 
                padding-left: 1cm;
                padding-right: 1cm;
                padding-bottom: 1cm;
            }
            
            .force-page-break {
                page-break-before: always;
                break-before: page;
            }
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="trang-bg text-white shadow-lg sticky top-0 z-10 print-break-inside-avoid">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3 w-full md:w-auto">
                    <span class="material-symbols-outlined text-4xl">stadium</span>
                    <div>
                        <h1 class="text-xl sm:text-2xl font-bold tracking-wide">ระบบตรวจสอบจำนวนนักกีฬาคณะศรีตรัง</h1>
                    </div>
                </div>

                <div class="flex items-center gap-2 sm:gap-4 w-full md:w-auto justify-between md:justify-end">
                    <div class="text-xs sm:text-sm bg-white/20 px-3 py-2 rounded-lg backdrop-blur-sm flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">schedule</span>
                        <span id="last-updated-text">อัปเดต : กำลังโหลด...</span>
                    </div>
                    
                    <div class="flex gap-2 no-print">
                        <button onclick="fetchData()" id="refresh-btn" class="bg-white trang-text hover:bg-gray-100 px-3 sm:px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition-colors shadow-sm">
                            <span class="material-symbols-outlined" id="refresh-icon">sync</span>
                            <span class="hidden sm:inline">รีเฟรช</span>
                        </button>
                        <button onclick="openPrintAllPreview()" class="bg-purple-900 text-white hover:bg-purple-950 px-3 sm:px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition-colors border border-white/30 shadow-sm">
                            <span class="material-symbols-outlined">print</span>
                            <span class="hidden sm:inline">พิมพ์ทั้งหมด</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
        
        <div id="loading-state" class="flex flex-col items-center justify-center py-20 text-gray-500">
            <span class="material-symbols-outlined text-6xl spin-anim mb-4 trang-text">autorenew</span>
            <p class="text-lg font-medium" id="loading-text">กำลังเชื่อมต่อและดึงข้อมูลจากชีต...</p>
        </div>

        <div id="dashboard-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 items-start hidden">
        </div>

    </main>

    <footer class="hidden print:block mt-8 text-center text-sm text-gray-500 pb-8" id="print-footer"></footer>

    <!-- =========================================================
         Modal สำหรับแสดงตัวอย่างรายชื่อก่อนพิมพ์
         ========================================================= -->
    <div id="print-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden">
            
            <div class="trang-bg text-white px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined" id="modal-icon">print</span>
                    <h2 class="text-xl font-bold" id="modal-title">เตรียมพิมพ์รายชื่อ</h2>
                </div>
                <button onclick="closeModal()" class="text-white/80 hover:text-white transition-colors">
                    <span class="material-symbols-outlined text-3xl">close</span>
                </button>
            </div>

            <div class="p-6 overflow-y-auto bg-gray-50 flex-grow">
                <div class="bg-white border p-8 shadow-sm rounded-lg min-h-[500px]" id="modal-preview-content">
                </div>
            </div>

            <div class="border-t p-4 bg-white flex justify-end gap-3">
                <button onclick="closeModal()" class="px-5 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-medium transition-colors">
                    ยกเลิก
                </button>
                <button onclick="executePrint()" class="px-6 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-bold flex items-center gap-2 transition-colors shadow-md">
                    <span class="material-symbols-outlined">print</span>
                    ยืนยันการพิมพ์
                </button>
            </div>
        </div>
    </div>

    <!-- พื้นที่ลับสำหรับสั่งพิมพ์ -->
    <div id="print-area" class="hidden"></div>


    <script>
        const SPORTS_CONFIG = [
            { id: 'football', name: 'ฟุตบอล', icon: 'sports_soccer', categories: [ 
                { name: 'ชาย', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 1, real: 7, sub: 8 }, { name: 'ม.3 - ม.4', sheetIndex: 2, real: 7, sub: 8 }, { name: 'ม.5 - ม.6', sheetIndex: 3, real: 7, sub: 8 } ]}, 
                { name: 'หญิง', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 4, real: 7, sub: 8 }, { name: 'ม.4 - ม.6', sheetIndex: 5, real: 7, sub: 8 } ]} 
            ]},
            { id: 'basketball', name: 'บาสเกตบอล', icon: 'sports_basketball', categories: [ 
                { name: 'ชาย', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 6, real: 5, sub: 10 }, { name: 'ม.4 - ม.6', sheetIndex: 7, real: 5, sub: 10 } ]}, 
                { name: 'หญิง', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 8, real: 5, sub: 10 }, { name: 'ม.4 - ม.6', sheetIndex: 9, real: 5, sub: 10 } ]} 
            ]},
            { id: 'volleyball', name: 'วอลเลย์บอล', icon: 'sports_volleyball', categories: [ 
                { name: 'ชาย', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 10, real: 6, sub: 9 }, { name: 'ม.3 - ม.4', sheetIndex: 11, real: 6, sub: 9 }, { name: 'ม.5 - ม.6', sheetIndex: 12, real: 6, sub: 9 } ]}, 
                { name: 'หญิง', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 13, real: 6, sub: 9 }, { name: 'ม.4 - ม.6', sheetIndex: 14, real: 6, sub: 9 } ]} 
            ]},
            { id: 'takraw', name: 'เซปักตะกร้อ', icon: 'sports_martial_arts', categories: [ 
                { name: 'ชาย', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 15, real: 3, sub: 1 }, { name: 'ม.3 - ม.4', sheetIndex: 16, real: 3, sub: 1 }, { name: 'ม.5 - ม.6', sheetIndex: 17, real: 3, sub: 1 } ]}, 
                { name: 'หญิง', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 18, real: 3, sub: 1 }, { name: 'ม.4 - ม.6', sheetIndex: 19, real: 3, sub: 1 } ]} 
            ]},
            { id: 'tabletennis', name: 'เทเบิลเทนนิส', icon: 'sports_tennis', categories: [ 
                { name: 'ชายเดี่ยว', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 20, real: 1, sub: 0 }, { name: 'ม.3 - ม.4', sheetIndex: 21, real: 1, sub: 0 }, { name: 'ม.5 - ม.6', sheetIndex: 22, real: 1, sub: 0 } ]}, 
                { name: 'ชายคู่', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 23, real: 2, sub: 0 }, { name: 'ม.3 - ม.4', sheetIndex: 24, real: 2, sub: 0 }, { name: 'ม.5 - ม.6', sheetIndex: 25, real: 2, sub: 0 } ]}, 
                { name: 'หญิงเดี่ยว', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 26, real: 1, sub: 0 }, { name: 'ม.3 - ม.4', sheetIndex: 27, real: 1, sub: 0 }, { name: 'ม.5 - ม.6', sheetIndex: 28, real: 1, sub: 0 } ]}, 
                { name: 'หญิงคู่', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 29, real: 2, sub: 0 }, { name: 'ม.3 - ม.4', sheetIndex: 30, real: 2, sub: 0 }, { name: 'ม.5 - ม.6', sheetIndex: 31, real: 2, sub: 0 } ]}, 
                { name: 'คู่ผสม', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 32, real: 2, sub: 0 }, { name: 'ม.3 - ม.4', sheetIndex: 33, real: 2, sub: 0 }, { name: 'ม.5 - ม.6', sheetIndex: 34, real: 2, sub: 0 } ]} 
            ]},
            { id: 'petanque', name: 'เปตอง', icon: 'sports_baseball', categories: [ 
                { name: 'ชาย', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 35, real: 3, sub: 1 }, { name: 'ม.3 - ม.4', sheetIndex: 36, real: 3, sub: 1 }, { name: 'ม.5 - ม.6', sheetIndex: 37, real: 3, sub: 1 } ]}, 
                { name: 'หญิง', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 38, real: 3, sub: 1 }, { name: 'ม.3 - ม.4', sheetIndex: 39, real: 3, sub: 1 }, { name: 'ม.5 - ม.6', sheetIndex: 40, real: 3, sub: 1 } ]} 
            ]},
            { id: 'badminton', name: 'แบดมินตัน', icon: 'sports_tennis', categories: [ 
                { name: 'ชาย', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 41, real: 3, sub: 2 }, { name: 'ม.4 - ม.6', sheetIndex: 42, real: 3, sub: 2 } ]}, 
                { name: 'หญิง', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 43, real: 3, sub: 2 }, { name: 'ม.4 - ม.6', sheetIndex: 44, real: 3, sub: 2 } ]} 
            ]},
            { id: 'dancesport', name: 'ลีลาศ', icon: 'accessibility_new', categories: [ 
                { name: 'ชาย - หญิง', levels: [ { name: 'ม.ต้น', sheetIndex: 45, real: 2, sub: 2 }, { name: 'ม.ปลาย', sheetIndex: 46, real: 2, sub: 2 } ]} 
            ]},
            { id: 'esport', name: 'E-Sport', icon: 'sports_esports', categories: [ 
                { name: 'Free Fire', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 47, real: 4, sub: 1 }, { name: 'ม.4 - ม.6', sheetIndex: 48, real: 4, sub: 1 } ]} 
            ]}
        ];

        function getFormattedDate() {
            const date = new Date();
            const hh = String(date.getHours()).padStart(2, '0');
            const mm = String(date.getMinutes()).padStart(2, '0');
            const ss = String(date.getSeconds()).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const yy = String(date.getFullYear()).slice(-2);
            return `${hh} : ${mm} : ${ss} - ${dd} / ${month} / ${yy}`;
        }

        const API_URL = "https://script.google.com/macros/s/AKfycbyYcyfX0znWZJaf1Tp6SQxV5XEkGJqKO7-s4G5dLjIbw0VD-PeVWb9wLD2VC1F0PpN3/exec"; 
        
        let globalSheetDetails = {};

        function fetchData() {
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('dashboard-container').classList.add('hidden');
            const btnIcon = document.getElementById('refresh-icon');
            btnIcon.classList.add('spin-anim');
            document.getElementById('loading-text').innerHTML = 'กำลังเชื่อมต่อและดึงข้อมูลจากชีต...';

            fetch(API_URL)
                .then(response => {
                    if (!response.ok) throw new Error("Network response was not ok");
                    return response.json();
                })
                .then(apiData => {
                    renderDashboard(apiData.counts);
                    globalSheetDetails = apiData.details;
                    
                    const updatedTime = getFormattedDate();
                    document.getElementById('last-updated-text').textContent = `อัปเดต : ${updatedTime}`;
                    
                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('dashboard-container').classList.remove('hidden');
                })
                .catch(error => {
                    console.error("Error fetching data:", error);
                    document.getElementById('loading-text').innerHTML = `
                        <span class="text-red-500 font-bold block mb-2">เกิดข้อผิดพลาดในการดึงข้อมูล</span>
                        กรุณาตรวจสอบลิงก์ API หรือการเชื่อมต่ออินเทอร์เน็ต<br>
                        <span class="text-sm font-normal">รายละเอียด: ${error.message}</span>
                    `;
                })
                .finally(() => {
                    btnIcon.classList.remove('spin-anim');
                });
        }

        // =================================================================
        // Helper: สร้างตาราง HTML ของแต่ละการแข่งขัน
        // =================================================================
        function generateTableHTML(sportName, catName, levelName, sheetIndex, isFirstElement = false) {
            const sheetData = globalSheetDetails[sheetIndex];
            
            let displayCatName = catName;
            if(catName === "Free Fire") displayCatName = ""; 
            
            const titleText = `${sportName} ${displayCatName} ${levelName}`;
            
            let tableHTML = '';
            
            if (!sheetData || !sheetData.rows || sheetData.rows.length === 0) {
                tableHTML = `<div class="text-center text-gray-500 py-6 text-lg border border-dashed border-gray-300 bg-gray-50 mb-10">ยังไม่มีผู้สมัครในรายการนี้</div>`;
            } else {
                tableHTML = `<table class="print-table w-full text-left mb-10">`;
                
                tableHTML += `<thead><tr>`;
                tableHTML += `<th class="w-12 text-center border-b-2 border-purple-300">ลำดับ</th>`;
                sheetData.headers.forEach(header => {
                    tableHTML += `<th class="border-b-2 border-purple-300">${header}</th>`;
                });
                tableHTML += `</tr></thead><tbody>`;
                
                sheetData.rows.forEach((row, rowIndex) => {
                    tableHTML += `<tr class="hover:bg-gray-50">`;
                    tableHTML += `<td class="text-center">${rowIndex + 1}</td>`;
                    row.forEach(cell => {
                        const cellData = (cell === null || cell === undefined) ? "" : cell;
                        tableHTML += `<td>${cellData}</td>`;
                    });
                    tableHTML += `</tr>`;
                });
                tableHTML += `</tbody></table>`;
            }
            
            const breakClass = isFirstElement ? '' : 'force-page-break';
            const displayStyle = isFirstElement ? 'padding-top: 1cm; padding-left: 1cm; padding-right: 1cm; padding-bottom: 1cm;' : '';

            return `
                <div class="page-container ${breakClass}" style="${displayStyle}">
                    <div class="print-header trang-text font-bold text-center text-2xl mb-6 pb-2 border-b-2 border-purple-900">
                        ${titleText}
                    </div>
                    ${tableHTML}
                </div>
            `;
        }

        // =================================================================
        // ระบบจัดการการพิมพ์ (พิมพ์เดี่ยว และ พิมพ์ทั้งหมด)
        // =================================================================
        function openPrintPreview(sportName, catName, levelName, sheetIndex) {
            const modal = document.getElementById('print-modal');
            const previewContent = document.getElementById('modal-preview-content');
            const printArea = document.getElementById('print-area');
            
            document.getElementById('modal-title').textContent = "เตรียมพิมพ์รายชื่อ (เดี่ยว)";
            document.getElementById('modal-icon').textContent = "print";

            const fullContentHTML = generateTableHTML(sportName, catName, levelName, sheetIndex, true);

            previewContent.innerHTML = fullContentHTML;
            printArea.innerHTML = fullContentHTML;
            modal.classList.remove('hidden');
        }
        
        function openPrintAllPreview() {
            if(Object.keys(globalSheetDetails).length === 0) {
                alert("กรุณารอโหลดข้อมูลให้เสร็จก่อนสั่งพิมพ์ทั้งหมดครับ");
                return;
            }

            const modal = document.getElementById('print-modal');
            const previewContent = document.getElementById('modal-preview-content');
            const printArea = document.getElementById('print-area');
            
            document.getElementById('modal-title').textContent = "เตรียมพิมพ์รายชื่อทั้งหมด (48 รายการ)";
            document.getElementById('modal-icon').textContent = "print";
            
            previewContent.innerHTML = '<div class="text-center py-10"><span class="material-symbols-outlined text-4xl spin-anim text-purple-600">autorenew</span><p class="mt-2">กำลังรวบรวมข้อมูลทั้งหมด 48 รายการ...</p></div>';
            modal.classList.remove('hidden');

            setTimeout(() => {
                let allHTML = '';
                let isFirst = true;

                SPORTS_CONFIG.forEach(sport => {
                    sport.categories.forEach(category => {
                        category.levels.forEach(level => {
                            allHTML += generateTableHTML(sport.name, category.name, level.name, level.sheetIndex, isFirst);
                            isFirst = false; 
                        });
                    });
                });

                previewContent.innerHTML = allHTML;
                printArea.innerHTML = allHTML;
            }, 100);
        }

        function closeModal() {
            document.getElementById('print-modal').classList.add('hidden');
        }

        function executePrint() {
            window.print();
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('print-modal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // =================================================================
        // สร้าง Dashboard 
        // =================================================================
        function renderDashboard(apiCountsData) {
            const container = document.getElementById('dashboard-container');
            let htmlContent = '';

            SPORTS_CONFIG.forEach(sport => {
                htmlContent += `
                    <div class="card-container bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 print-break-inside-avoid">
                        <div class="trang-bg text-white px-4 py-3 flex items-center gap-2">
                            <span class="material-symbols-outlined">${sport.icon}</span>
                            <h2 class="text-lg font-bold">${sport.name}</h2>
                        </div>
                        <div class="p-4 space-y-5">
                `;

                sport.categories.forEach(category => {
                    let iconHTML = '';
                    if (category.name === 'Free Fire' || category.name.includes('ชาย - หญิง') || category.name.includes('คู่ผสม')) {
                        iconHTML = `<span class="material-symbols-outlined trang-text text-[16px]">wc</span>`;
                    } else if (category.name === 'ชายคู่') {
                        iconHTML = `<div class="flex items-center"><span class="material-symbols-outlined trang-text text-[16px]">man</span><span class="material-symbols-outlined trang-text text-[16px] -ml-1">man</span></div>`;
                    } else if (category.name === 'หญิงคู่') {
                        iconHTML = `<div class="flex items-center"><span class="material-symbols-outlined trang-text text-[16px]">woman</span><span class="material-symbols-outlined trang-text text-[16px] -ml-1">woman</span></div>`;
                    } else if (category.name.includes('ชาย')) {
                        iconHTML = `<span class="material-symbols-outlined trang-text text-[16px]">man</span>`;
                    } else if (category.name.includes('หญิง')) {
                        iconHTML = `<span class="material-symbols-outlined trang-text text-[16px]">woman</span>`;
                    } else {
                        iconHTML = `<span class="material-symbols-outlined trang-text text-[16px]">group</span>`;
                    }
                    
                    htmlContent += `
                        <div class="space-y-3">
                            <div class="flex items-center gap-2 border-b pb-1">
                                ${iconHTML}
                                <h3 class="font-semibold text-gray-800">${category.name}</h3>
                            </div>
                            <div class="space-y-3 pl-2">
                    `;

                    category.levels.forEach(level => {
                        const maxTotal = level.real + level.sub;
                        const registered = apiCountsData[level.sheetIndex] || 0;
                        
                        // คำนวณความกว้างหลอด
                        let realContainerWidth = (level.real / maxTotal) * 100;
                        let subContainerWidth = level.sub > 0 ? (level.sub / maxTotal) * 100 : 0;
                        
                        // คำนวณการเติมสีในหลอด
                        let realFill = 0;
                        let subFill = 0;

                        // ตัวเลขสำหรับแสดงผล ตัวจริง X / Max | สำรอง Y / Max
                        let currentReal = 0;
                        let currentSub = 0;

                        if (registered <= level.real) {
                            realFill = (registered / level.real) * 100;
                            subFill = 0;
                            currentReal = registered;
                            currentSub = 0;
                        } else {
                            realFill = 100; 
                            currentReal = level.real;
                            currentSub = registered - level.real;
                            if (level.sub > 0) {
                                subFill = Math.min(((registered - level.real) / level.sub) * 100, 100);
                            }
                        }

                        // สร้างข้อความ ตัวจริง / สำรอง
                        let detailText = `ตัวจริง ${currentReal} / ${level.real}`;
                        if (level.sub > 0) {
                            detailText += ` | สำรอง ${currentSub} / ${level.sub}`;
                        }

                        let textColor = "text-red-500"; 
                        const isFull = registered === maxTotal;
                        const isOver = registered > maxTotal;
                        
                        if (isFull) textColor = "text-green-600";
                        if (isOver) textColor = "trang-text font-bold";

                        htmlContent += `
                            <div class="space-y-1 relative level-row">
                                <div class="flex justify-between items-center text-sm">
                                    <div class="flex flex-col w-3/4">
                                        <span class="font-medium text-gray-700 flex flex-wrap items-center gap-2">
                                            ${level.name}
                                            <button onclick="openPrintPreview('${sport.name}', '${category.name}', '${level.name}', ${level.sheetIndex})" class="bg-purple-100 hover:bg-purple-200 text-purple-700 rounded px-2 py-1 text-[11px] flex items-center gap-1 cursor-pointer font-medium border shadow-sm transition-colors">
                                                <span class="material-symbols-outlined text-[14px]">print</span> พิมพ์
                                            </button>
                                        </span>
                                    </div>
                                    <span class="font-bold ${textColor} w-1/4 text-right">
                                        ${registered} / ${maxTotal}
                                    </span>
                                </div>
                                
                                <div class="w-full flex gap-1 h-2.5 items-center mt-1">
                                    <div class="bg-gray-200 rounded-full h-full flex overflow-hidden" style="width: ${realContainerWidth}%" title="ตัวจริง">
                                        <div class="h-full bg-purple-600 transition-all duration-500" style="width: ${realFill}%"></div>
                                    </div>
                                    
                                    ${level.sub > 0 ? `
                                    <div class="bg-gray-200 rounded-full h-full flex overflow-hidden" style="width: ${subContainerWidth}%" title="สำรอง">
                                        <div class="h-full bg-purple-300 transition-all duration-500" style="width: ${subFill}%"></div>
                                    </div>
                                    ` : ''}
                                </div>
                                
                                <div class="text-[11px] text-gray-500 text-right mt-1">
                                    ${detailText}
                                </div>
                            </div>
                        `;
                    });

                    htmlContent += `
                            </div>
                        </div>
                    `;
                });

                htmlContent += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = htmlContent;
        }

        window.onload = () => {
            fetchData();
        };

    </script>
</body>
</html>
