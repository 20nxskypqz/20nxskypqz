<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบจำนวนนักกีฬาคณะศรีตรัง</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f3f4f6;
        }
        
        .trang-bg { background-color: #5c2d91; }
        .trang-text { color: #5c2d91; }
        .trang-border { border-color: #5c2d91; }
        
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-break-inside-avoid { break-inside: avoid; }
            .shadow-md { box-shadow: none !important; border: 1px solid #e5e7eb; }
            #dashboard-container { 
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important; 
                gap: 1rem !important;
            }
            .card-container { margin-bottom: 1rem; }
            
            /* ซ่อนปุ่มพิมพ์รายชื่อย่อยเมื่อพิมพ์หน้าหลัก */
            .print-btn-mini { display: none !important; }
        }

        .spin-anim { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* สไตล์ปุ่มพิมพ์ย่อย */
        .level-row:hover .print-btn-mini { opacity: 1; }
        .print-btn-mini { transition: opacity 0.2s; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="trang-bg text-white shadow-lg sticky top-0 z-10 print-break-inside-avoid">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3 w-full md:w-auto">
                    <span class="material-symbols-outlined text-4xl">stadium</span>
                    <div>
                        <h1 class="text-xl sm:text-2xl font-bold tracking-wide">ระบบตรวจสอบจำนวนนักกีฬาคณะศรีตรัง</h1>
                    </div>
                </div>

                <div class="flex items-center gap-2 sm:gap-4 w-full md:w-auto justify-between md:justify-end">
                    <div class="text-xs sm:text-sm bg-white/20 px-3 py-2 rounded-lg backdrop-blur-sm flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">schedule</span>
                        <span id="last-updated-text">อัปเดต : กำลังโหลด...</span>
                    </div>
                    
                    <div class="flex gap-2 no-print">
                        <button onclick="fetchData()" id="refresh-btn" class="bg-white trang-text hover:bg-gray-100 px-3 sm:px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition-colors shadow-sm">
                            <span class="material-symbols-outlined" id="refresh-icon">sync</span>
                            <span class="hidden sm:inline">รีเฟรช</span>
                        </button>
                        <button onclick="window.print()" class="bg-purple-900 text-white hover:bg-purple-950 px-3 sm:px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition-colors border border-white/30 shadow-sm">
                            <span class="material-symbols-outlined">print</span>
                            <span class="hidden sm:inline">ภาพรวม</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
        
        <div id="loading-state" class="flex flex-col items-center justify-center py-20 text-gray-500">
            <span class="material-symbols-outlined text-6xl spin-anim mb-4 trang-text">autorenew</span>
            <p class="text-lg font-medium" id="loading-text">กำลังเชื่อมต่อและดึงข้อมูลจากชีต...</p>
        </div>

        <div id="dashboard-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 items-start hidden">
        </div>

    </main>

    <footer class="hidden print:block mt-8 text-center text-sm text-gray-500 pb-8" id="print-footer"></footer>

    <script>
        const SPORTS_CONFIG = [
            { id: 'football', name: 'ฟุตบอล', icon: 'sports_soccer', categories: [ 
                { name: 'ชาย', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 1, real: 7, sub: 8 }, { name: 'ม.3 - ม.4', sheetIndex: 2, real: 7, sub: 8 }, { name: 'ม.5 - ม.6', sheetIndex: 3, real: 7, sub: 8 } ]}, 
                { name: 'หญิง', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 4, real: 7, sub: 8 }, { name: 'ม.4 - ม.6', sheetIndex: 5, real: 7, sub: 8 } ]} 
            ]},
            { id: 'basketball', name: 'บาสเกตบอล', icon: 'sports_basketball', categories: [ 
                { name: 'ชาย', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 6, real: 5, sub: 10 }, { name: 'ม.4 - ม.6', sheetIndex: 7, real: 5, sub: 10 } ]}, 
                { name: 'หญิง', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 8, real: 5, sub: 10 }, { name: 'ม.4 - ม.6', sheetIndex: 9, real: 5, sub: 10 } ]} 
            ]},
            { id: 'volleyball', name: 'วอลเลย์บอล', icon: 'sports_volleyball', categories: [ 
                { name: 'ชาย', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 10, real: 6, sub: 9 }, { name: 'ม.3 - ม.4', sheetIndex: 11, real: 6, sub: 9 }, { name: 'ม.5 - ม.6', sheetIndex: 12, real: 6, sub: 9 } ]}, 
                { name: 'หญิง', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 13, real: 6, sub: 9 }, { name: 'ม.4 - ม.6', sheetIndex: 14, real: 6, sub: 9 } ]} 
            ]},
            { id: 'takraw', name: 'เซปักตะกร้อ', icon: 'sports_martial_arts', categories: [ 
                { name: 'ชาย', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 15, real: 3, sub: 1 }, { name: 'ม.3 - ม.4', sheetIndex: 16, real: 3, sub: 1 }, { name: 'ม.5 - ม.6', sheetIndex: 17, real: 3, sub: 1 } ]}, 
                { name: 'หญิง', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 18, real: 3, sub: 1 }, { name: 'ม.4 - ม.6', sheetIndex: 19, real: 3, sub: 1 } ]} 
            ]},
            { id: 'tabletennis', name: 'เทเบิลเทนนิส', icon: 'sports_tennis', categories: [ 
                { name: 'ชายเดี่ยว', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 20, real: 1, sub: 0 }, { name: 'ม.3 - ม.4', sheetIndex: 21, real: 1, sub: 0 }, { name: 'ม.5 - ม.6', sheetIndex: 22, real: 1, sub: 0 } ]}, 
                { name: 'ชายคู่', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 23, real: 2, sub: 0 }, { name: 'ม.3 - ม.4', sheetIndex: 24, real: 2, sub: 0 }, { name: 'ม.5 - ม.6', sheetIndex: 25, real: 2, sub: 0 } ]}, 
                { name: 'หญิงเดี่ยว', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 26, real: 1, sub: 0 }, { name: 'ม.3 - ม.4', sheetIndex: 27, real: 1, sub: 0 }, { name: 'ม.5 - ม.6', sheetIndex: 28, real: 1, sub: 0 } ]}, 
                { name: 'หญิงคู่', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 29, real: 2, sub: 0 }, { name: 'ม.3 - ม.4', sheetIndex: 30, real: 2, sub: 0 }, { name: 'ม.5 - ม.6', sheetIndex: 31, real: 2, sub: 0 } ]}, 
                { name: 'คู่ผสม', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 32, real: 2, sub: 0 }, { name: 'ม.3 - ม.4', sheetIndex: 33, real: 2, sub: 0 }, { name: 'ม.5 - ม.6', sheetIndex: 34, real: 2, sub: 0 } ]} 
            ]},
            { id: 'petanque', name: 'เปตอง', icon: 'sports_baseball', categories: [ 
                { name: 'ชาย', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 35, real: 3, sub: 1 }, { name: 'ม.3 - ม.4', sheetIndex: 36, real: 3, sub: 1 }, { name: 'ม.5 - ม.6', sheetIndex: 37, real: 3, sub: 1 } ]}, 
                { name: 'หญิง', levels: [ { name: 'ม.1 - ม.2', sheetIndex: 38, real: 3, sub: 1 }, { name: 'ม.3 - ม.4', sheetIndex: 39, real: 3, sub: 1 }, { name: 'ม.5 - ม.6', sheetIndex: 40, real: 3, sub: 1 } ]} 
            ]},
            { id: 'badminton', name: 'แบดมินตัน', icon: 'sports_tennis', categories: [ 
                { name: 'ชาย', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 41, real: 3, sub: 2 }, { name: 'ม.4 - ม.6', sheetIndex: 42, real: 3, sub: 2 } ]}, 
                { name: 'หญิง', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 43, real: 3, sub: 2 }, { name: 'ม.4 - ม.6', sheetIndex: 44, real: 3, sub: 2 } ]} 
            ]},
            { id: 'dancesport', name: 'ลีลาศ', icon: 'accessibility_new', categories: [ 
                { name: 'ชาย - หญิง', levels: [ { name: 'ม.ต้น', sheetIndex: 45, real: 2, sub: 2 }, { name: 'ม.ปลาย', sheetIndex: 46, real: 2, sub: 2 } ]} 
            ]},
            { id: 'esport', name: 'E-Sport', icon: 'sports_esports', categories: [ 
                { name: 'Free Fire', levels: [ { name: 'ม.1 - ม.3', sheetIndex: 47, real: 4, sub: 1 }, { name: 'ม.4 - ม.6', sheetIndex: 48, real: 4, sub: 1 } ]} 
            ]}
        ];

        function getFormattedDate() {
            const date = new Date();
            const hh = String(date.getHours()).padStart(2, '0');
            const mm = String(date.getMinutes()).padStart(2, '0');
            const ss = String(date.getSeconds()).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const yy = String(date.getFullYear()).slice(-2);
            return `${hh} : ${mm} : ${ss} - ${dd} / ${month} / ${yy}`;
        }

        const API_URL = "https://script.google.com/macros/s/AKfycbyYcyfX0znWZJaf1Tp6SQxV5XEkGJqKO7-s4G5dLjIbw0VD-PeVWb9wLD2VC1F0PpN3/exec"; 
        
        function fetchData() {
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('dashboard-container').classList.add('hidden');
            const btnIcon = document.getElementById('refresh-icon');
            btnIcon.classList.add('spin-anim');
            document.getElementById('loading-text').innerHTML = 'กำลังเชื่อมต่อและดึงข้อมูลจากชีต...';

            fetch(API_URL)
                .then(response => {
                    if (!response.ok) throw new Error("Network response was not ok");
                    return response.json();
                })
                .then(apiData => {
                    console.log("Data loaded by sheet index:", apiData); 
                    renderDashboard(apiData);
                    
                    const updatedTime = getFormattedDate();
                    document.getElementById('last-updated-text').textContent = `อัปเดต : ${updatedTime}`;
                    document.getElementById('print-footer').textContent = `พิมพ์เมื่อ : ${updatedTime} - ระบบตรวจสอบจำนวนนักกีฬาคณะศรีตรัง`;
                    
                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('dashboard-container').classList.remove('hidden');
                })
                .catch(error => {
                    console.error("Error fetching data:", error);
                    document.getElementById('loading-text').innerHTML = `
                        <span class="text-red-500 font-bold block mb-2">เกิดข้อผิดพลาดในการดึงข้อมูล</span>
                        กรุณาตรวจสอบลิงก์ API ว่าอัปเดตเวอร์ชันใหม่เรียบร้อยแล้ว<br>
                        <span class="text-sm font-normal">รายละเอียด: ${error.message}</span>
                    `;
                })
                .finally(() => {
                    btnIcon.classList.remove('spin-anim');
                });
        }

        // ฟังก์ชันจำลองการกดพิมพ์รายชื่อ (เตรียมไว้สำหรับอนาคต)
        function printCategoryDetails(sportName, catName, levelName, sheetIndex) {
            alert(`ฟีเจอร์กำลังพัฒนา: พิมพ์รายชื่อของ ${sportName} ${catName} รุ่น ${levelName} (จากชีต index ${sheetIndex})`);
            // ในอนาคตสามารถใส่โค้ดเปิด Popup ดึงรายชื่อมาแสดงและสั่งพิมพ์ได้ที่นี่
        }

        function renderDashboard(apiData) {
            const container = document.getElementById('dashboard-container');
            let htmlContent = '';

            SPORTS_CONFIG.forEach(sport => {
                htmlContent += `
                    <div class="card-container bg-white rounded-xl shadow-md overflow-hidden print-break-inside-avoid border border-gray-100">
                        <div class="trang-bg text-white px-4 py-3 flex items-center gap-2">
                            <span class="material-symbols-outlined">${sport.icon}</span>
                            <h2 class="text-lg font-bold">${sport.name}</h2>
                        </div>
                        <div class="p-4 space-y-5">
                `;

                sport.categories.forEach(category => {
                    // กำหนดไอคอนให้เข้ากับเพศ
                    let catIcon = 'group';
                    if (category.name === 'ชาย' || category.name === 'ชายเดี่ยว' || category.name === 'ชายคู่') catIcon = 'man';
                    else if (category.name === 'หญิง' || category.name === 'หญิงเดี่ยว' || category.name === 'หญิงคู่') catIcon = 'woman';
                    else if (category.name === 'ชาย - หญิง' || category.name === 'คู่ผสม') catIcon = 'wc';
                    
                    htmlContent += `
                        <div class="space-y-3">
                            <div class="flex items-center gap-2 border-b pb-1">
                                <span class="material-symbols-outlined trang-text text-sm">${catIcon}</span>
                                <h3 class="font-semibold text-gray-800">${category.name}</h3>
                            </div>
                            <div class="space-y-3 pl-2">
                    `;

                    category.levels.forEach(level => {
                        const maxTotal = level.real + level.sub;
                        const registered = apiData[level.sheetIndex] || 0;
                        
                        let realPercent = 0;
                        let subPercent = 0;

                        if (registered <= level.real) {
                            realPercent = (registered / maxTotal) * 100;
                        } else {
                            realPercent = (level.real / maxTotal) * 100;
                            const subCount = Math.min(registered - level.real, level.sub);
                            subPercent = (subCount / maxTotal) * 100;
                        }

                        let textColor = "text-red-500"; 
                        const isFull = registered === maxTotal;
                        const isOver = registered > maxTotal;
                        
                        if (isFull) textColor = "text-green-600";
                        if (isOver) textColor = "trang-text font-bold";

                        // เพิ่มคลาส level-row เพื่อให้แสดงปุ่มพิมพ์เมื่อเอาเมาส์ชี้
                        htmlContent += `
                            <div class="space-y-1 relative level-row group">
                                <div class="flex justify-between items-center text-sm">
                                    <div class="flex flex-col">
                                        <span class="font-medium text-gray-700 flex items-center gap-2">
                                            ${level.name}
                                            <button onclick="printCategoryDetails('${sport.name}', '${category.name}', '${level.name}', ${level.sheetIndex})" class="print-btn-mini opacity-0 lg:hidden group-hover:inline-flex bg-gray-100 hover:bg-gray-200 text-gray-600 rounded px-1.5 py-0.5 text-[10px] items-center gap-1 cursor-pointer" title="พิมพ์รายชื่อ">
                                                <span class="material-symbols-outlined text-[12px]">print</span> พิมพ์
                                            </button>
                                        </span>
                                    </div>
                                    <span class="font-bold ${textColor}">
                                        ${registered} / ${maxTotal}
                                    </span>
                                </div>
                                
                                <div class="w-full bg-gray-200 rounded-full h-2.5 flex overflow-hidden">
                                    <div class="h-2.5 bg-purple-600 transition-all duration-500" style="width: ${realPercent}%" title="ตัวจริง"></div>
                                    <div class="h-2.5 bg-purple-300 transition-all duration-500" style="width: ${subPercent}%" title="สำรอง"></div>
                                </div>
                                
                                <div class="text-[11px] text-gray-500 text-right">
                                    ตัวจริง ${level.real} | สำรอง ${level.sub}
                                </div>
                            </div>
                        `;
                    });

                    htmlContent += `
                            </div>
                        </div>
                    `;
                });

                htmlContent += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = htmlContent;
        }

        window.onload = () => {
            fetchData();
        };

    </script>
</body>
</html>
